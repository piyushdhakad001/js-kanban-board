<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="title">Project Board</p>
      <button class="add-button">+Add Task</button>
    </div>

    <div class="board">
      <div class="column task-box-1">
        <div class="task-header">ToDo</div>
        <div class="task-cont"></div>
      </div>
      
      <div class="column task-box-2">
        <div class="task-header">In Progress</div>
        <div class="task-cont"></div>
      </div>

      <div class="column task-box-3">
        <div class="task-header">Done</div>
        <div class="task-cont"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
